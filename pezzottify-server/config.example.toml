# Pezzottify Catalog Server Configuration
# Copy this file to config.toml and customize for your deployment.
# Values here override CLI arguments.

# Core settings
db_dir = "/data/db"
media_path = "/data/media"
port = 3001
metrics_port = 9091
logging_level = "path"
content_cache_age_sec = 60
frontend_dir_path = "/app/web"

# Downloader service URL (enables download manager when set)
# The downloader should be on the same Docker network (pezzottify-internal)
# downloader_url = "http://downloader:3002"
downloader_timeout_sec = 300

# Event pruning
event_retention_days = 30
prune_interval_hours = 24

# Download Manager settings
# Enables passive download queue. Users submit requests, an external script
# picks them up and fulfills them via the ingestion system.
[download_manager]

# Rate Limiting
# Maximum albums a user can request per hour
max_albums_per_hour = 10
# Maximum albums a user can request per day
max_albums_per_day = 60
# Maximum requests a user can make per day (across all types)
user_max_requests_per_day = 100
# Maximum items a user can have in the queue at once
user_max_queue_size = 200

# Time before in-progress items are flagged as stale (seconds)
stale_in_progress_threshold_secs = 3600

# Retry Settings
# Maximum retry attempts for failed downloads
max_retries = 8
# Initial delay before first retry (seconds)
initial_backoff_secs = 60
# Maximum delay between retries (seconds)
max_backoff_secs = 86400
# Multiplier for exponential backoff
backoff_multiplier = 2.5

# Audit Log
# Days to retain audit log entries (0 to disable cleanup)
audit_log_retention_days = 90

# Search settings
[search]
# Search engine to use: "pezzothash" (default), "fts5", "fts5-levenshtein", "noop"
# - pezzothash: SimHash-based fuzzy search (built-in typo tolerance, unbounded memory)
# - fts5: SQLite FTS5 with trigram tokenizer (fast, bounded memory)
# - fts5-levenshtein: FTS5 with Levenshtein-based typo correction (best typo tolerance)
# - noop: Disabled search (returns empty results, fastest startup)
engine = "pezzothash"

# Catalog Store settings
[catalog_store]
# Number of connections for concurrent read operations (default: 4)
# Increase this value if you have high concurrent read traffic
# Each connection uses additional memory, so don't over-provision
read_pool_size = 4

# Shared agent LLM settings
# Metadata Enrichment v1 reuses this existing agent configuration; it does
# not define a separate model/provider config. Simple-AI can be used here if
# it exposes an OpenAI-compatible chat endpoint.
# [agent]
# enabled = true
# max_iterations = 20
#
# [agent.llm]
# provider = "openai" # "openai" for OpenAI-compatible APIs, otherwise Ollama
# base_url = "http://simple-ai:8000/v1"
# model = "your-chat-model"
# api_key = "your-api-key"
# temperature = 0.2
# timeout_secs = 120

# Related Artists Enrichment
# Populates related artists via MusicBrainz and Last.fm APIs.
# Requires both lastfm_api_key and musicbrainz_user_agent to be set.
# [related_artists]
# enabled = true
# lastfm_api_key = "your-lastfm-api-key"
# musicbrainz_user_agent = "pezzottify/1.0 (admin@example.com)"
# batch_size = 50
# similar_artists_limit = 20
# interval_hours = 12

# Audio Embeddings
# Periodically generates missing track embeddings through Simple-AI.
# The default specs are:
# - musicfm-msd / musicfm.mean.v1
# - ast-audioset / ast.audioset.v1
# - ast-audioset / ast.instruments.v1
# [audio_embeddings]
# enabled = true
# simple_ai_base_url = "http://simple-ai:8000"
# api_key_env = "SIMPLE_AI_API_KEY"
# interval_hours = 24
# jitter_minutes = 120
# max_tracks_per_run = 1000
# request_timeout_secs = 300
#
# Optional custom specs override the defaults:
# [[audio_embeddings.specs]]
# model = "musicfm-msd"
# namespace = "musicfm.mean.v1"
#
# Derived album embeddings are materialized into entity_embeddings with
# entity_type = "album" when every catalog track is present on disk and has
# the required source embedding.
# [audio_embeddings.album_derivations]
# enabled = true
# interval_hours = 24
# jitter_minutes = 120
# max_albums_per_run = 1000
#
# Default derived album namespaces:
# - album.musicfm.median.v1 from musicfm.mean.v1
# - album.ast.median.v1 from ast.audioset.v1
# - album.ast.essence.q25.v1 from ast.audioset.v1
# - album.ast_instruments.median.v1 from ast.instruments.v1
# - album.ast_instruments.essence.q25.v1 from ast.instruments.v1
#
# Artist factual/cultural embedding namespace contract:
# - artist.fact.genres.v1
# - artist.fact.instruments.v1
# - artist.fact.roles.v1
# - artist.fact.years.v1
# - artist.fact.places.v1
# - artist.cultural.text_embedding.v1

# Background Jobs settings
[background_jobs]

# Popular Content Job
# Pre-computes popular albums and artists based on listening data
[background_jobs.popular_content]
# Interval in hours between job runs (default: 6)
interval_hours = 6
# Number of top albums to compute (default: 20)
albums_limit = 20
# Number of top artists to compute (default: 20)
artists_limit = 20
# Number of days of listening data to consider (default: 30)
lookback_days = 30
# Number of days of impression data to consider (default: 365)
impression_lookback_days = 365
# Number of days to retain impression data before pruning (default: 365)
impression_retention_days = 365

# Catalog Availability Stats Job
# Verifies filesystem-backed availability flags and stores aggregate stats snapshot.
[background_jobs.catalog_availability_stats]
# Interval in hours between runs (default: 6)
interval_hours = 6
# Delay before first run after startup (default: 60)
startup_delay_minutes = 60

# What's New Batch Job
# Creates batches from pending What's New albums
[background_jobs.whatsnew_batch]
# Interval in hours between job runs (default: 6)
interval_hours = 6

# Metadata Enrichment v1 Job
# Processes queued artist/album/track enrichment requests, seeding from listening data when empty.
[background_jobs.metadata_enrichment]
# Interval in hours between job runs (default: 6)
interval_hours = 6
# Maximum queued entities to process per run (default: 2000)
batch_size = 2000
# Retry delay for retryable enrichment failures, including disabled agent LLM (default: 21600)
retry_after_secs = 21600

# Ingestion Cleanup Job (only registered if ingestion is enabled)
# Cleans up orphaned ingestion temp directories
[background_jobs.ingestion_cleanup]
# Interval in hours between job runs (default: 1)
# Increase this if hourly cleanup is too frequent for your use case
interval_hours = 1
# Minimum age in seconds before a temp directory is eligible for cleanup (default: 300)
min_age_secs = 300

# Audit Log Cleanup Job
# Deletes old audit log entries based on retention policy
[background_jobs.audit_log_cleanup]
# Interval in hours between job runs (default: 24)
interval_hours = 24
# Number of days to retain audit log entries (default: 90)
retention_days = 90
